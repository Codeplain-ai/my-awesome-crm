<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Awesome CRM</title>
  <style>
    :root {
      /* Brand palette */
      --font-brand: 'NeueMontreal', monospace;
      --color-brand-yellow: #e0ff6e;
      --color-brand-green: #79fc96;
      --color-brand-green-light: #c5dcd9;
      --color-brand-green-dark: #223936;
      --color-brand-blue: #0a1fd4;
      --color-brand-black: #0F0F0F;
      --color-brand-black-light: #121212;
      --color-brand-white: #ffffff;
      --color-brand-red: #D00505;
      --color-brand-gray: #808080;
      --color-brand-gray-light: #666666;
      --color-brand-status-error: #dd5353;
      --color-brand-status-error-light: #fee4e2;
      --color-brand-status-warning: #dc6803;
      --color-brand-status-warning-light: #fef0c7;
      --color-brand-status-success: #79fc96;
      --color-brand-avatar-bg: #9ca7754d;

      /* Semantic mapping */
      --bg: var(--color-brand-black);
      --panel: var(--color-brand-black-light);
      --line: var(--color-brand-green-dark);
      --text: var(--color-brand-white);
      --muted: var(--color-brand-gray);
      --accent: var(--color-brand-green);
      --ok: var(--color-brand-status-success);
      --err: var(--color-brand-status-error);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: var(--font-brand), system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.5;
    }
    header { padding: 24px 32px; border-bottom: 1px solid var(--line); text-align: center; }
    h1 { margin: 0; font-size: 22px; }
    .tagline { margin: 4px 0 0; color: var(--muted); font-weight: 400; font-size: 14px; }
    main { max-width: 1280px; margin: 0 auto; padding: 24px 32px; }
    section { margin-bottom: 32px; }
    h2 {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
    }
    .hint { margin: 4px 0 14px; font-size: 13px; color: var(--muted); }
    .integrations { display: flex; flex-wrap: wrap; gap: 10px; }
    button {
      background: var(--panel); color: var(--text); border: 1px solid var(--line);
      padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 14px;
      font-family: inherit; line-height: 1.2;
      transition: border-color .15s, background .15s, color .15s;
    }
    /* Integration buttons: uniform, tidy chips */
    .integrations button {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 150px; font-weight: 600;
    }
    .integrations button:hover:not(:disabled) {
      border-color: var(--accent); color: var(--accent);
    }
    button:hover:not(:disabled) { border-color: var(--accent); }
    button:disabled { opacity: .5; cursor: progress; }
    /* Refresh: quiet, text-only action that lives next to a heading */
    button.refresh {
      margin-left: auto; background: transparent; border: none; padding: 4px 6px;
      color: var(--muted); font-size: 12px; text-transform: none; letter-spacing: 0;
    }
    button.refresh:hover:not(:disabled) { color: var(--accent); }
    #status { min-height: 22px; margin: 12px 0; font-size: 14px; }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    .count { font-size: 28px; font-weight: 700; }
    .count.zero { color: var(--muted); }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--line); font-size: 14px; }
    td { vertical-align: top; }
    td .cell {
      max-width: 220px; overflow-x: auto; white-space: nowrap;
    }
    td .cell::-webkit-scrollbar { height: 6px; }
    td .cell::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    th { color: var(--muted); font-weight: 600; }
    .sources span {
      display: inline-block; background: var(--panel); border: 1px solid var(--line);
      border-radius: 999px; padding: 1px 8px; font-size: 12px; margin: 1px 2px; color: var(--accent);
    }
    .custom span {
      display: inline-block; background: var(--panel); border: 1px solid var(--line);
      border-radius: 999px; padding: 1px 8px; font-size: 12px; margin: 1px 2px; color: var(--muted);
    }
    .custom span b { color: var(--text); font-weight: 600; }
    .empty { color: var(--muted); font-style: italic; padding: 16px 0; }
  </style>
</head>
<body>
  <header>
    <h1>My Awesome CRM</h1>
    <p class="tagline">one contact list to rule them all</p>
  </header>
  <main>
    <section>
      <h2>Integrations <button class="refresh" onclick="loadIntegrations()">↻ rediscover</button></h2>
      <p class="hint">Click an integration to sync its contacts into My Awesome CRM.</p>
      <div class="integrations" id="integrations"><span class="empty">Discovering…</span></div>
    </section>

    <div id="status"></div>

    <section>
      <h2>Contacts <button class="refresh" onclick="loadContacts()">↻ refresh</button></h2>
      <div class="count zero" id="count">—</div>
      <div id="contacts"></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function setStatus(msg, kind) {
      const el = $("status");
      el.textContent = msg || "";
      el.className = kind || "";
    }

    async function loadIntegrations() {
      const box = $("integrations");
      box.innerHTML = '<span class="empty">Discovering…</span>';
      try {
        // The list is whatever the server discovers at runtime — nothing hardcoded.
        const res = await fetch("/ingest/discover", { method: "POST" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const { discovered } = await res.json();
        box.innerHTML = "";
        if (!discovered.length) {
          box.innerHTML = '<span class="empty">No integrations found.</span>';
          return;
        }
        for (const name of discovered) {
          const btn = document.createElement("button");
          btn.textContent = name;
          btn.title = "Sync My Awesome CRM with " + name;
          btn.onclick = () => ingest(name, btn);
          box.appendChild(btn);
        }
      } catch (e) {
        box.innerHTML = '<span class="empty">Failed to discover integrations.</span>';
        setStatus("Discovery failed: " + e.message, "err");
      }
    }

    async function ingest(name, btn) {
      setStatus("Syncing with " + name + "…", "");
      let prevLabel;
      if (btn) {
        btn.disabled = true;
        prevLabel = btn.textContent;
        btn.textContent = name + " — syncing…";
      }
      try {
        const res = await fetch("/ingest/" + encodeURIComponent(name));
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || ("HTTP " + res.status));
        setStatus(
          `✓ ${name}: fetched ${data.fetched}, created ${data.created}, updated ${data.updated}`,
          "ok"
        );
        await loadContacts();
      } catch (e) {
        setStatus("✗ " + name + ": " + e.message, "err");
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = prevLabel;
        }
      }
    }

    async function loadContacts() {
      try {
        const res = await fetch("/contacts?limit=200");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        renderContacts(data);
      } catch (e) {
        setStatus("Failed to load contacts: " + e.message, "err");
      }
    }

    function renderContacts({ items, total }) {
      const count = $("count");
      count.textContent = total + (total === 1 ? " contact" : " contacts");
      count.className = "count" + (total === 0 ? " zero" : "");

      const box = $("contacts");
      if (!items.length) {
        box.innerHTML = '<div class="empty">No contacts yet — ingest an integration above.</div>';
        return;
      }
      const rows = items.map((c) => {
        const sources = (c.source_links || [])
          .map((s) => `<span>${s.provider_id}</span>`).join("");
        const custom = Object.entries(c.custom_fields || {})
          .map(([k, v]) => `<span><b>${esc(k)}:</b> ${esc(v)}</span>`).join("");
        return `<tr>
          <td><div class="cell">${esc(c.full_name)}</div></td>
          <td><div class="cell">${esc(c.primary_email) || "—"}</div></td>
          <td><div class="cell">${esc(c.phone) || "—"}</div></td>
          <td><div class="cell">${esc(c.job_title) || "—"}</div></td>
          <td><div class="cell">${esc(c.company_name) || "—"}</div></td>
          <td><div class="cell custom">${custom || "—"}</div></td>
          <td><div class="cell sources">${sources || "—"}</div></td>
        </tr>`;
      }).join("");
      box.innerHTML = `<table>
        <thead><tr>
          <th>Name</th><th>Email</th><th>Phone</th><th>Title</th>
          <th>Company</th><th>Custom Fields</th><th>Sources</th>
        </tr></thead>
        <tbody>${rows}</tbody></table>`;
    }

    function esc(v) {
      if (v == null) return "";
      return String(v).replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    // Boot: discover integrations, then show the (initially empty) contact list.
    loadIntegrations();
    loadContacts();
  </script>
</body>
</html>
